version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_dev
    restart: unless-stopped

    environment:
      SA_PASSWORD: "YourStrong@Password123"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

    networks:
      - sqlserver_network

volumes:
  sqlserver_data:

networks:
  sqlserver_network: